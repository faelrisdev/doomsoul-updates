name: Discord Highscore Top 1

on:
  schedule:
    - cron: "3,8,13,18,23,28,33,38,43,48,53,58 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-top1:
    runs-on: ubuntu-latest

    env:
      TALO_LEADERBOARD_INTERNAL_NAME: "solo_high_score"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check Talo leaderboard and notify Discord
        env:
          TALO_ACCESS_KEY: ${{ secrets.TALO_ACCESS_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_HIGHSCORE_WEBHOOK }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.parse
          import urllib.request
          import urllib.error
          from pathlib import Path
          from datetime import datetime, timezone

          leaderboard_name = os.environ["TALO_LEADERBOARD_INTERNAL_NAME"].strip()
          talo_access_key = os.environ["TALO_ACCESS_KEY"].strip()
          discord_webhook_url = os.environ["DISCORD_WEBHOOK_URL"].strip()

          if not leaderboard_name:
              raise SystemExit("TALO_LEADERBOARD_INTERNAL_NAME is empty")

          if not talo_access_key:
              raise SystemExit("TALO_ACCESS_KEY secret is empty")

          if not discord_webhook_url:
              raise SystemExit("DISCORD_HIGHSCORE_WEBHOOK secret is empty")

          state_path = Path(".github/state/talo_top1.json")
          state_path.parent.mkdir(parents=True, exist_ok=True)

          def fetch_talo_entries():
              base_url = (
                  "https://api.trytalo.com/v1/leaderboards/"
                  + urllib.parse.quote(leaderboard_name, safe="")
                  + "/entries"
              )

              query_variants = [
                  {"page": "0", "withDeleted": "false"},
                  {"page": "0", "withDeleted": "0"},
                  {"page": "0", "withDeleted": "true"}
              ]

              last_error = None

              for query_params in query_variants:
                  query = urllib.parse.urlencode(query_params)
                  url = base_url + "?" + query

                  print(f"Trying Talo URL: {url}")

                  req = urllib.request.Request(
                      url,
                      headers={
                          "Accept": "application/json",
                          "Authorization": f"Bearer {talo_access_key}",
                          "User-Agent": "Doomsoul-GitHubAction/1.0"
                      },
                      method="GET"
                  )

                  try:
                      with urllib.request.urlopen(req) as response:
                          raw = response.read().decode("utf-8")
                          print("Talo request succeeded.")
                          return json.loads(raw)

                  except urllib.error.HTTPError as e:
                      body = e.read().decode("utf-8", errors="replace")
                      last_error = f"HTTP {e.code}: {body}"
                      print(f"Talo request failed with {last_error}")

              raise SystemExit("All Talo request variants failed. Last error: " + str(last_error))

          data = fetch_talo_entries()

          def extract_entries(payload):
              if isinstance(payload, list):
                  return payload

              if not isinstance(payload, dict):
                  return []

              for key in ("entries", "items", "results"):
                  if isinstance(payload.get(key), list):
                      return payload[key]

              nested = payload.get("data")
              if isinstance(nested, list):
                  return nested

              if isinstance(nested, dict):
                  for key in ("entries", "items", "results"):
                      if isinstance(nested.get(key), list):
                          return nested[key]

              return []

          entries = extract_entries(data)

          if not entries:
              print("No leaderboard entries found.")
              print("Raw Talo payload:")
              print(json.dumps(data, indent=2, ensure_ascii=False)[:4000])
              raise SystemExit(0)

          top3 = entries[:3]

          def get_score(entry):
              value = entry.get("score", entry.get("value", 0))
              try:
                  number = float(value)
                  if number.is_integer():
                      return str(int(number))
                  return str(number)
              except Exception:
                  return str(value)

          def get_player_name(entry):
              candidates = []

              alias = entry.get("alias")
              if isinstance(alias, dict):
                  candidates.extend([
                      alias.get("identifier"),
                      alias.get("username"),
                      alias.get("name"),
                      alias.get("displayName"),
                      alias.get("display_name")
                  ])

              player_alias = entry.get("playerAlias") or entry.get("player_alias")
              if isinstance(player_alias, dict):
                  candidates.extend([
                      player_alias.get("identifier"),
                      player_alias.get("username"),
                      player_alias.get("name"),
                      player_alias.get("displayName"),
                      player_alias.get("display_name")
                  ])
              elif isinstance(player_alias, str):
                  candidates.append(player_alias)

              player = entry.get("player")
              if isinstance(player, dict):
                  candidates.extend([
                      player.get("username"),
                      player.get("name"),
                      player.get("displayName"),
                      player.get("display_name")
                  ])

              candidates.extend([
                  entry.get("username"),
                  entry.get("playerName"),
                  entry.get("player_name"),
                  entry.get("displayName"),
                  entry.get("display_name"),
                  entry.get("name")
              ])

              for candidate in candidates:
                  if candidate:
                      return str(candidate)

              return "Unknown player"

          def entry_identity(entry):
              entry_id = entry.get("id") or entry.get("_id")
              player = get_player_name(entry)
              score = get_score(entry)
              return f"{entry_id or player}:{score}"

          current_top1 = top3[0]
          current_top1_id = entry_identity(current_top1)

          previous_state = {}
          if state_path.exists():
              previous_state = json.loads(state_path.read_text(encoding="utf-8"))

          previous_top1_id = previous_state.get("top1Id")

          new_state = {
              "top1Id": current_top1_id,
              "leaderboard": leaderboard_name,
              "player": get_player_name(current_top1),
              "score": get_score(current_top1),
              "checkedAt": datetime.now(timezone.utc).isoformat()
          }

          state_path.write_text(
              json.dumps(new_state, indent=2, ensure_ascii=False),
              encoding="utf-8"
          )

          if not previous_top1_id:
              print("Initial top 1 state saved. No Discord notification sent.")
              raise SystemExit(0)

          if previous_top1_id == current_top1_id:
              print("Top 1 unchanged. No Discord notification sent.")
              raise SystemExit(0)

          medals = ["🥇", "🥈", "🥉"]
          lines = []

          for index, entry in enumerate(top3):
              lines.append(
                  f"{medals[index]} **#{index + 1} {get_player_name(entry)}** — `{get_score(entry)}`"
              )

          payload = {
              "username": "Doomsoul Leaderboard",
              "content": "🏆 **NEW DOOMSOUL TOP 1!**",
              "allowed_mentions": {
                  "parse": []
              },
              "embeds": [
                  {
                      "title": "🏆 New Leaderboard Champion",
                      "description": "\n".join(lines),
                      "footer": {
                          "text": f"Leaderboard: {leaderboard_name}"
                      }
                  }
              ]
          }

          discord_data = json.dumps(payload).encode("utf-8")

          discord_req = urllib.request.Request(
              discord_webhook_url,
              data=discord_data,
              headers={
                  "Content-Type": "application/json",
                  "User-Agent": "DiscordBot (https://github.com/faelrisdev/doomsoul-updates, 1.0)"
              },
              method="POST"
          )

          try:
              with urllib.request.urlopen(discord_req) as response:
                  if response.status not in (200, 204):
                      raise SystemExit(f"Discord webhook failed: HTTP {response.status}")
          except urllib.error.HTTPError as e:
              body = e.read().decode("utf-8", errors="replace")
              raise SystemExit(f"Discord webhook failed: HTTP {e.code}: {body}")

          print("New top 1 notification sent.")
          PY

      - name: Commit updated top 1 state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .github/state/talo_top1.json

          if git diff --cached --quiet; then
            echo "No state change to commit."
          else
            git commit -m "ci: update Talo top 1 state"
            git push
          fi
